<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Necro File URL Page</title>
</head>
<body>
  <h1>URL掲示板テスト</h1>

  <input id="msg" placeholder="メッセージ">
  <input id="url" placeholder="URL">
  <button onclick="post()">投稿</button>

  <div id="list"></div>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCzM_KVgIaq979u1reLRqH91kboB8D1yok",
    authDomain: "undertale-au-talk-web.firebaseapp.com",
    projectId: "undertale-au-talk-web",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.post = async function () {
    const msg = document.getElementById("msg").value;
    const url = document.getElementById("url").value;

    await addDoc(collection(db, "posts"), {
      message: msg,
      url: url,
      time: new Date().toISOString()
    });

    alert("保存できた！");
  };
  </script>
</body>
</html>
