<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Necro File URL Page</title>
</head>
<body>
  <h1>URL掲示板テスト</h1>

  <input id="msg" placeholder="メッセージ">
  <input id="url" placeholder="URL">
  <button onclick="post()">投稿</button>

  <div id="list"></div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCzM_KVgIaq979u1reLRqH91kboB8D1yok",
  authDomain: "undertale-au-talk-web.firebaseapp.com",
  projectId: "undertale-au-talk-web"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addEventListener("DOMContentLoaded", () => {
  const list = document.getElementById("list");

  async function load() {
    list.innerHTML = "";

    const querySnapshot = await getDocs(collection(db, "posts"));

    querySnapshot.forEach((doc) => {
      const data = doc.data();

      const div = document.createElement("div");
      div.innerHTML = `
        <p>${data.message}</p>
        <a href="${data.url}" target="_blank">${data.url}</a>
        <hr>
      `;

      list.appendChild(div);
    });

    console.log("件数:", querySnapshot.size);
  }

  window.post = async function () {
    const msg = document.getElementById("msg").value;
    const url = document.getElementById("url").value;

    document.getElementById("msg").value = "";
    document.getElementById("url").value = "";
  };

  load();
});
  </script>
</body>
</html>
